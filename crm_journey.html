<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LF Mall CRM 고객 여정 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F0F2F5; --surface:#FFF; --border:#DDE1EA;
  --text:#1A1917; --sub:#4A4840; --muted:#8A8778;
  --ch-sms:#C8381A; --ch-alimtok:#B07A00; --ch-friends:#2E7D32; --ch-email:#1565C0;
  --st-new:#1A6E3C; --st-new-bg:#EBF7EF; --st-new-b:rgba(26,110,60,.2);
  --st-mod:#1A5A8A; --st-mod-bg:#EBF1FA; --st-mod-b:rgba(26,90,138,.2);
  --st-keep:#5A5650; --st-keep-bg:#F5F4F1; --st-keep-b:#D8D6CE;
  --st-del:#C8381A; --st-del-bg:#FDEFED; --st-del-b:rgba(200,56,26,.2);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.5}
.topbar{position:sticky;top:0;z-index:200;background:#1A1917;display:flex;align-items:center;gap:12px;padding:0 24px;height:48px;border-bottom:1px solid #333}
.tb-badge{font-family:'DM Mono',monospace;font-size:9px;color:#C8381A;letter-spacing:.14em;text-transform:uppercase}
.tb-title{font-size:12px;color:#A8A49A}
.tb-date{margin-left:auto;font-family:'DM Mono',monospace;font-size:9px;color:#4A4840}
.content{padding:24px 28px 60px}
.stage-section{margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stage-head{padding:14px 20px;color:#fff;display:flex;align-items:center;gap:10px}
.stage-head-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.35);flex-shrink:0}
.stage-head-label{font-size:15px;font-weight:900;letter-spacing:-.02em}
.stage-head-mosu{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;opacity:.7}
.gap-row{padding:8px 20px;background:#FFFBF0;border-bottom:1px solid #F0D580;font-size:11px;color:#92600A}
.view-row{padding:14px 20px 16px;background:var(--surface)}
.view-row.tobe{background:#FAFBFC}
.row-meta{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.row-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:600;padding:3px 0}
.row-count{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:8px}
.cards-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;align-items:flex-start}
.cards-scroll::-webkit-scrollbar{height:4px}
.cards-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mid-divider{height:1px;background:#C8CDD8;margin:0}
.card{flex:0 0 200px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative;border-left:3px solid #ccc}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);transform:translateY(-1px)}
.card-badges{display:flex;align-items:center;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.ch-badge{font-size:9.5px;padding:2px 7px;border-radius:10px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:.03em}
.push-badge{font-size:9px;padding:2px 6px;border-radius:8px;background:#37474F;color:#fff;font-family:'DM Mono',monospace}
.status-badge{font-size:9.5px;padding:2px 7px;border-radius:10px;font-weight:600;cursor:pointer;user-select:none;margin-left:auto;border:1px solid transparent}
.status-badge:hover{opacity:.8}
.card-code{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;justify-content:space-between}
.card-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.card:hover .card-actions{opacity:1}
.act-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.act-btn:hover{background:var(--border)}
.act-del:hover{background:#FDEFED;color:#C8381A;border-color:rgba(200,56,26,.3)}
.card-label{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.35}
.card-timing{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.add-btn{flex:0 0 42px;height:88px;border:1.5px dashed var(--border);border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted);transition:all .15s}
.add-btn:hover{border-color:#888;color:#555;background:rgba(0,0,0,.02)}
.det-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:140;backdrop-filter:blur(1px)}
.det-overlay.on{display:block}
.det-panel{position:fixed;right:0;top:48px;bottom:0;width:380px;background:#fff;border-left:1px solid var(--border);transform:translateX(100%);transition:transform .2s cubic-bezier(.4,0,.2,1);z-index:150;display:flex;flex-direction:column;overflow:hidden}
.det-panel.on{transform:translateX(0)}
.det-close{position:absolute;top:14px;right:14px;width:28px;height:28px;background:#f0f0f0;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--muted);z-index:10}
.det-close:hover{background:var(--border)}
.det-head{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.det-code{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:4px}
.det-title{font-size:15px;font-weight:800;letter-spacing:-.01em;margin-bottom:8px}
.det-body{padding:16px 18px;overflow-y:auto;flex:1}
.det-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:12px;margin-bottom:4px}
.det-lbl:first-child{margin-top:0}
.det-val{background:#F8F9FB;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--sub);line-height:1.7;white-space:pre-wrap;word-break:keep-all}
.det-val.hl{border-left:3px solid #1565C0;background:#EEF3FB}
.det-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-ov.on{display:flex}
.modal{background:#fff;border-radius:12px;width:540px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head-title{font-size:14px;font-weight:700}
.modal-x{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:#f5f5f5;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-x:hover{background:var(--border)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.form-row{display:flex;gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;flex:1}
.fg.half{flex:.5}
.fg label{font-size:10.5px;font-weight:600;color:var(--sub);margin-bottom:4px}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;background:#fff;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#888}
.fg textarea{resize:vertical}
.push-wrap{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;user-select:none;height:34px}
.push-wrap input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#37474F}
.push-wrap span{font-size:12px}
.st-btns{display:flex;gap:6px;flex-wrap:wrap}
.st-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);transition:all .1s}
.st-btn.on-new{background:var(--st-new-bg);color:var(--st-new);border-color:var(--st-new-b)}
.st-btn.on-mod{background:var(--st-mod-bg);color:var(--st-mod);border-color:var(--st-mod-b)}
.st-btn.on-keep{background:var(--st-keep-bg);color:var(--st-keep);border-color:var(--st-keep-b)}
.st-btn.on-del{background:var(--st-del-bg);color:var(--st-del);border-color:var(--st-del-b)}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .15s}
.btn-primary{background:#1A1917;color:#fff}
.btn-primary:hover{background:#333}
.btn-ghost{background:#fff;color:var(--sub);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-badge">CRM</span>
  <span class="tb-title">LF Mall 자동화 메시지 · 고객 여정 대시보드</span>
  <span class="tb-date">2026.05</span>
</div>

<div class="content" id="content"></div>

<div class="det-overlay" id="detOv" onclick="closeDet()"></div>
<div class="det-panel" id="detPanel">
  <div class="det-close" onclick="closeDet()">×</div>
  <div id="detContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
</div>

<div class="modal-ov" id="modalOv">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-head-title" id="modalTitle">캠페인 추가</span>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="fg half"><label>코드</label><input id="fCode" type="text" placeholder="예: LL01"></div>
        <div class="fg half"><label>발송 채널</label>
          <select id="fCh">
            <option value="sms">📱 SMS</option>
            <option value="alimtok">💬 알림톡</option>
            <option value="friends">💚 플친메시지</option>
            <option value="email">✉️ 이메일</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="fg"><label>캠페인명</label><input id="fLabel" type="text" placeholder="캠페인명을 입력하세요"></div>
      </div>
      <div class="form-row">
        <div class="fg half"><label>발송 타이밍</label><input id="fTiming" type="text" placeholder="예: D+7 11:00"></div>
        <div class="fg half"><label>&nbsp;</label>
          <label class="push-wrap"><input type="checkbox" id="fPush"><span>🔔 PUSH 병행 발송</span></label>
        </div>
      </div>
      <div class="form-row" id="fStatusRow">
        <div class="fg"><label>변경 유형 (TO-BE)</label>
          <div class="st-btns" id="fStatusBtns">
            <button class="st-btn" data-s="new"  onclick="pickStatus('new')">➕ 신규</button>
            <button class="st-btn" data-s="mod"  onclick="pickStatus('mod')">🔧 수정</button>
            <button class="st-btn" data-s="keep" onclick="pickStatus('keep')">✅ 유지</button>
            <button class="st-btn" data-s="del"  onclick="pickStatus('del')">❌ 삭제검토</button>
          </div>
        </div>
      </div>
      <div class="form-row"><div class="fg"><label>트리거 조건</label><textarea id="fTrigger" rows="2" placeholder="발송 조건"></textarea></div></div>
      <div class="form-row"><div class="fg"><label>오퍼 / 혜택</label><textarea id="fOffer" rows="2" placeholder="제공 혜택"></textarea></div></div>
      <div class="form-row"><div class="fg"><label>메시지 / 문구</label><textarea id="fMessage" rows="4" placeholder="발송 메시지 문구"></textarea></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

  {id:uid(),stage:0,v:'asis',ch:'sms',push:false,code:'LL01',label:'웰컴 쿠폰 5종 안내',timing:'D+1 08:00',trigger:'가입 후 1일',offer:'플러스쿠폰 5종 / 앱 다운로드 3,000M',msg:'(광고)[LFmall] #{고객명}님, LFmall 가입을 축하드립니다.\n신규가입 웰컴 선물이 도착했어요! [플러스쿠폰 5종] 지급 완료♥\n잠깐! 지금 LFmall 앱 다운로드 시 3,000 마일리지가 쏙!'},

  {id:uid(),stage:0,v:'asis',ch:'sms',push:false,code:'LL05',label:'100일 기념 쿠폰',timing:'가입 100일 11:00',trigger:'가입 100일차',offer:'5,000원 장바구니쿠폰 (30일)',msg:'(광고)[LFmall] 우리.. 오늘 100일♥\n#{고객명}님과 LFmall이 만난 지 100일!\n시크릿 [5,000원 장바구니 쿠폰]을 선물 드려요.'},

function timingNum(t){
  if(!t)return 999;const s=t.toLowerCase();
  if(s.includes('실시간'))return -1;
  if(s.includes('방송')&&s.includes('전'))return -0.5;
  if(s==='즉시'||s.includes('즉시'))return 0;
  const hm=s.match(/(\d+)\s*시간|(\d+)h/);if(hm)return parseInt(hm[1]||hm[2])/24;
  if(s.includes('배송완료')){const m=s.match(/d\+(\d+)/i);return m?parseFloat(m[1]):0;}
  const dm=s.match(/d\+(\d+)/i);if(dm)return parseFloat(dm[1]);
  if(s.includes('90일'))return 90;if(s.includes('180일'))return 180;if(s.includes('270일'))return 270;
  if(s.includes('100일'))return 100;
  if(s.includes('매월')){const m=s.match(/(\d+)일/);return m?parseInt(m[1]):30;}
  if(s.includes('매일'))return 30;
  return 999;
}

function render(){
  document.getElementById('content').innerHTML=STAGES.map(renderStage).join('');
}

function renderStage(stage){
  const asis=[...CARDS.filter(c=>c.stage===stage.id&&c.v==='asis')].sort((a,b)=>timingNum(a.timing)-timingNum(b.timing));
  const tobe=[...CARDS.filter(c=>c.stage===stage.id&&c.v==='tobe')].sort((a,b)=>timingNum(a.timing)-timingNum(b.timing));
  const cnt={new:0,mod:0,keep:0,del:0};
  tobe.forEach(c=>{if(c.status&&cnt[c.status]!==undefined)cnt[c.status]++;});
  const stLabels={new:'신규',mod:'수정',keep:'유지',del:'삭제'};
  const stCounts=['new','mod','keep','del'].map(k=>cnt[k]>0?`<span class="row-count" style="background:${ST[k].bg};color:${ST[k].color};border:1px solid ${ST[k].b}">${stLabels[k]} ${cnt[k]}</span>`:'').join('');
  return `<div class="stage-section">
    <div class="stage-head" style="background:${stage.color}">
      <div class="stage-head-dot"></div>
      <div class="stage-head-label">${stage.label}</div>
      <div class="stage-head-mosu">${stage.mosu}</div>
    </div>
    <div class="gap-row">⚠ ${stage.gap}</div>
    <div class="view-row">
      <div class="row-meta">
        <span class="row-label" style="color:#8A8778">AS-IS</span>
        <span class="row-count" style="background:#F0F2F5;color:#8A8778">${asis.length}건</span>
      </div>
      <div class="cards-scroll">${asis.map(c=>cardHTML(c)).join('')}<button class="add-btn" onclick="openAdd('asis',${stage.id})">+</button></div>
    </div>
    <div class="mid-divider"></div>
    <div class="view-row tobe">
      <div class="row-meta">
        <span class="row-label" style="color:${stage.color}">TO-BE</span>
        <span class="row-count" style="background:${stage.color}18;color:${stage.color}">${tobe.length}건</span>
        ${stCounts}
      </div>
      <div class="cards-scroll">${tobe.map(c=>cardHTML(c)).join('')}<button class="add-btn" onclick="openAdd('tobe',${stage.id})">+</button></div>
    </div>
  </div>`;
}

function cardHTML(c){
  const ch=CH[c.ch]||CH.sms;
  const st=c.status?ST[c.status]:null;
  const stBadge=st?`<span class="status-badge" style="background:${st.bg};color:${st.color};border:1px solid ${st.b}" onclick="cycleStatus('${c.id}',event)">${st.label}</span>`:'';
  return `<div class="card" style="border-left-color:${ch.color}" onclick="openDet('${c.id}')">
    <div class="card-badges">
      <span class="ch-badge" style="background:${ch.bg};color:${ch.color}">${ch.icon} ${ch.label}</span>
      ${c.push?'<span class="push-badge">🔔 PUSH</span>':''}
      ${stBadge}
    </div>
    <div class="card-code"><span>${c.code}</span>
      <span class="card-actions">
        <button class="act-btn" onclick="openEdit('${c.id}',event)" title="편집">✏</button>
        <button class="act-btn act-del" onclick="delCard('${c.id}',event)" title="삭제">×</button>
      </span>
    </div>
    <div class="card-label">${c.label}</div>
    <div class="card-timing">⏱ ${c.timing}</div>
  </div>`;
}

function openDet(id){

        <span style="font-family:'DM Mono',monospace;font-size:9px;color:${ch.color};text-transform:uppercase;letter-spacing:.1em">${ch.icon} ${ch.label}</span>

      <div class="det-lbl">🎯 트리거 조건</div><div class="det-val">${c.trigger||'—'}</div>
      <div class="det-lbl">🎁 오퍼 / 혜택</div><div class="det-val hl">${c.offer||'—'}</div>

    </div>`;
  document.getElementById('detPanel').classList.add('on');

}
function closeDet(){
  document.getElementById('detPanel').classList.remove('on');
  document.getElementById('detOv').classList.remove('on');
}

const ST_ORDER=['new','mod','keep','del'];
function cycleStatus(id,e){
  e&&e.stopPropagation();
  const c=CARDS.find(x=>x.id===id);if(!c||!c.status)return;
  c.status=ST_ORDER[(ST_ORDER.indexOf(c.status)+1)%ST_ORDER.length];
  render();
}

let _editId=null,_editView=null,_editStage=null,_curStatus='new';

function openAdd(view,stage){
  _editId=null;_editView=view;_editStage=stage;_curStatus='new';
  document.getElementById('modalTitle').textContent='캠페인 추가';
  document.getElementById('fCode').value='';
  document.getElementById('fCh').value='sms';
  document.getElementById('fLabel').value='';
  document.getElementById('fTiming').value='';
  document.getElementById('fPush').checked=false;
  document.getElementById('fTrigger').value='';
  document.getElementById('fOffer').value='';
  document.getElementById('fMessage').value='';
  document.getElementById('fStatusRow').style.display=view==='tobe'?'':'none';
  highlightStatus('new');
  document.getElementById('modalOv').classList.add('on');
}

function openEdit(id,e){
  e&&e.stopPropagation();
  const c=CARDS.find(x=>x.id===id);if(!c)return;
  _editId=id;_editView=c.v;_editStage=c.stage;_curStatus=c.status||'keep';
  document.getElementById('modalTitle').textContent='캠페인 편집';
  document.getElementById('fCode').value=c.code;
  document.getElementById('fCh').value=c.ch;
  document.getElementById('fLabel').value=c.label;
  document.getElementById('fTiming').value=c.timing;
  document.getElementById('fPush').checked=c.push||false;
  document.getElementById('fTrigger').value=c.trigger||'';
  document.getElementById('fOffer').value=c.offer||'';
  document.getElementById('fMessage').value=c.msg||'';
  document.getElementById('fStatusRow').style.display=c.v==='tobe'?'':'none';
  highlightStatus(_curStatus);
  closeDet();
  document.getElementById('modalOv').classList.add('on');
}

function saveCard(){
  const label=document.getElementById('fLabel').value.trim();
  if(!label){alert('캠페인명을 입력하세요.');return;}
  const data={
    code:document.getElementById('fCode').value.trim(),
    ch:document.getElementById('fCh').value,
    label,
    timing:document.getElementById('fTiming').value.trim(),
    push:document.getElementById('fPush').checked,
    trigger:document.getElementById('fTrigger').value.trim(),
    offer:document.getElementById('fOffer').value.trim(),
    msg:document.getElementById('fMessage').value.trim(),
  };
  if(_editId){
    const c=CARDS.find(x=>x.id===_editId);
    if(c){Object.assign(c,data);if(c.v==='tobe')c.status=_curStatus;}
  } else {
    const nc={id:uid(),stage:_editStage,v:_editView,...data};
    if(_editView==='tobe')nc.status=_curStatus;
    CARDS.push(nc);
  }
  closeModal();render();
}

function delCard(id,e){
  e&&e.stopPropagation();
  const c=CARDS.find(x=>x.id===id);if(!c)return;
  if(!confirm(`"${c.label}" 캠페인을 삭제하시겠습니까?`))return;
  CARDS=CARDS.filter(x=>x.id!==id);
  closeDet();render();
}

function closeModal(){document.getElementById('modalOv').classList.remove('on');}

function pickStatus(s){_curStatus=s;highlightStatus(s);}
function highlightStatus(s){
  document.querySelectorAll('#fStatusBtns .st-btn').forEach(b=>{
    b.className='st-btn'+(b.dataset.s===s?` on-${b.dataset.s}`:'');
  });
}

document.getElementById('modalOv').addEventListener('click',function(e){if(e.target===this)closeModal();});

render();
