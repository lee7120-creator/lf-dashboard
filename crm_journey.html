<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LF Mall CRM 자동화 메시지 — 고객 여정 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F1;
  --surface: #FFFFFF;
  --surface2: #EFEDE7;
  --border: #D8D6CE;
  --text: #1A1917;
  --sub: #4A4840;
  --muted: #8A8778;

  --sms: #C8381A;
  --push: #1A5A8A;
  --alimtok: #B07A00;
  --inapp: #1A6E3C;

  --new: #1A6E3C;
  --mod: #1A5A8A;
  --keep: #5A5650;
  --del: #C8381A;

  --stage-0: #2D2B28;
  --stage-1: #C8381A;
  --stage-2: #1A5A8A;
  --stage-3: #8A5A00;
  --stage-4: #1A6E3C;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: var(--text);
  display: flex; align-items: center; padding: 0 32px; gap: 16px;
  z-index: 200;
  border-bottom: 1px solid #333;
}
.topbar-badge {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--sms); letter-spacing: .14em; text-transform: uppercase;
}
.topbar-title { font-size: 12px; color: #A8A49A; font-weight: 400; }
.topbar-meta { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 9px; color: #4A4840; }
.topbar-view-toggle {
  display: flex; gap: 4px; margin-left: 20px;
}
.view-btn {
  font-family: 'DM Mono', monospace; font-size: 9px;
  padding: 4px 10px; border-radius: 2px; cursor: pointer;
  border: 1px solid #444; color: #888; background: transparent;
  text-transform: uppercase; letter-spacing: .08em;
  transition: all .15s;
}
.view-btn.active { background: var(--sms); border-color: var(--sms); color: #fff; }

/* ── LAYOUT ── */
.shell { display: flex; padding-top: 48px; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--text);
  padding: 24px 0; position: sticky; top: 48px; height: calc(100vh - 48px);
  overflow-y: auto; z-index: 100;
}
.sidebar-section-label {
  font-family: 'DM Mono', monospace; font-size: 8px;
  color: #3A3835; text-transform: uppercase; letter-spacing: .14em;
  padding: 0 20px 10px;
}
.stage-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 20px; cursor: pointer; transition: all .15s;
  border-left: 3px solid transparent; width: 100%;
  background: transparent; text-align: left;
}
.stage-btn:hover { background: rgba(255,255,255,.04); }
.stage-btn.active { background: rgba(255,255,255,.07); }
.stage-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.stage-label { font-size: 11.5px; color: #A8A49A; line-height: 1.4; font-weight: 400; }
.stage-btn.active .stage-label { color: #F0EFE9; font-weight: 600; }
.stage-count {
  margin-left: auto; font-family: 'DM Mono', monospace; font-size: 9px;
  color: #4A4840; flex-shrink: 0;
}
.stage-btn.active .stage-count { color: #6A6560; }

.sidebar-divider { height: 1px; background: #2A2825; margin: 12px 0; }

.sidebar-legend { padding: 12px 20px; }
.legend-title {
  font-family: 'DM Mono', monospace; font-size: 8px;
  color: #3A3835; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px;
}
.legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.legend-text { font-size: 10.5px; color: #7A7870; }

/* ── MAIN ── */
.main { flex: 1; padding: 28px 32px 60px; min-width: 0; }

/* ── STAGE HEADER ── */
.stage-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
  padding-bottom: 16px; border-bottom: 2px solid var(--border);
}
.stage-header-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
}
.stage-header-label {
  font-size: 18px; font-weight: 900; letter-spacing: -.02em;
}
.stage-header-meta {
  margin-left: auto; display: flex; gap: 16px;
}
.stage-stat {
  text-align: right;
}
.stage-stat-num {
  font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700;
  line-height: 1;
}
.stage-stat-label {
  font-size: 9px; color: var(--muted); text-transform: uppercase;
  letter-spacing: .08em; margin-top: 2px;
}

/* ── VIEW TOGGLE TABS ── */
.view-tabs {
  display: flex; gap: 2px; margin-bottom: 20px;
  background: var(--surface2); padding: 3px; border-radius: 4px;
  width: fit-content;
}
.vtab {
  font-family: 'DM Mono', monospace; font-size: 10px;
  padding: 6px 16px; border-radius: 2px; cursor: pointer;
  color: var(--muted); background: transparent; border: none;
  text-transform: uppercase; letter-spacing: .08em; transition: all .15s;
}
.vtab.active {
  background: var(--text); color: #F0EFE9;
}

/* ── CHANNEL GROUP ── */
.channel-group { margin-bottom: 18px; }
.channel-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.channel-bar {
  height: 2px; width: 20px; border-radius: 1px;
}
.channel-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  text-transform: uppercase; letter-spacing: .12em; font-weight: 500;
}
.channel-badge {
  font-family: 'DM Mono', monospace; font-size: 8.5px;
  padding: 2px 7px; border-radius: 10px; margin-left: auto;
}

/* ── CAMPAIGN CARDS ── */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0;
  cursor: pointer;
  transition: box-shadow .15s, transform .1s;
  overflow: hidden;
  position: relative;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-1px); }
.card.active-card { box-shadow: 0 0 0 2px var(--text); }

.card-top {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
}
.card-code {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--muted); flex-shrink: 0;
}
.card-label { font-size: 12px; font-weight: 700; flex: 1; }
.card-status {
  font-size: 9px; padding: 2px 7px; border-radius: 10px;
  font-family: 'DM Mono', monospace; flex-shrink: 0;
}
.card-status.new { background: #EBF7EF; color: var(--new); border: 1px solid rgba(26,110,60,.2); }
.card-status.mod { background: #EBF1FA; color: var(--mod); border: 1px solid rgba(26,90,138,.2); }
.card-status.keep { background: #F5F4F1; color: var(--keep); border: 1px solid var(--border); }
.card-status.del { background: #FDEFED; color: var(--del); border: 1px solid rgba(200,56,26,.2); }

.card-bottom {
  padding: 8px 12px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.card-timing {
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
}
.card-expand { font-size: 10px; color: var(--muted); }

/* ── DETAIL PANEL ── */
.detail-panel {
  position: fixed; right: 0; top: 48px; bottom: 0; width: 400px;
  background: var(--surface); border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform .2s cubic-bezier(.4,0,.2,1);
  z-index: 150; overflow-y: auto; display: flex; flex-direction: column;
}
.detail-panel.open { transform: translateX(0); }

.detail-close {
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: var(--muted);
  transition: background .12s; z-index: 10;
}
.detail-close:hover { background: var(--border); }

.detail-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.detail-channel-tag {
  font-family: 'DM Mono', monospace; font-size: 9px;
  text-transform: uppercase; letter-spacing: .12em;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.detail-ch-dot { width: 6px; height: 6px; border-radius: 50%; }
.detail-code {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  margin-bottom: 4px;
}
.detail-title { font-size: 16px; font-weight: 800; letter-spacing: -.01em; margin-bottom: 8px; }
.detail-status-row { display: flex; gap: 6px; align-items: center; }

.detail-body { padding: 20px; flex: 1; }

.detail-section { margin-bottom: 20px; }
.detail-section-label {
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;
}
.detail-section-value {
  font-size: 12.5px; color: var(--sub); line-height: 1.75;
  background: var(--surface2); padding: 10px 12px; border-radius: 3px;
}
.detail-section-value.message {
  font-size: 12px; white-space: pre-wrap; word-break: keep-all;
}
.detail-section-value.highlight {
  border-left: 3px solid var(--push); background: #EEF4FB;
  color: var(--text);
}

.detail-timing {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--surface2); border-radius: 3px;
}
.detail-timing-icon { font-size: 14px; }
.detail-timing-text {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--sub);
}

/* ── EMPTY / GAP BADGE ── */
.gap-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: #FDF8EE; border: 1px solid #E8D9AA; border-radius: 3px;
  padding: 4px 10px; font-size: 11px; color: #8A5A00; margin-bottom: 12px;
}

/* ── SUMMARY BAR ── */
.summary-bar {
  display: flex; gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: 4px;
  overflow: hidden; margin-bottom: 24px;
}
.summary-cell {
  flex: 1; background: var(--surface); padding: 12px 14px;
}
.summary-num {
  font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700;
  line-height: 1; margin-bottom: 3px;
}
.summary-lbl {
  font-size: 9.5px; color: var(--muted); letter-spacing: .04em;
}

/* ── OVERLAY ── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3);
  z-index: 140; backdrop-filter: blur(1px);
}
.overlay.active { display: block; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.cards .card { animation: fadeIn .18s ease both; }


/* ── EDIT MODE ── */
.edit-mode-badge {
  display: none; align-items: center; gap: 6px;
  background: #B07A00; color: #fff;
  font-family: 'DM Mono', monospace; font-size: 9px;
  padding: 3px 10px; border-radius: 2px; text-transform: uppercase; letter-spacing:.1em;
}
.edit-mode-badge.visible { display: flex; }

.edit-toggle-btn {
  font-family: 'DM Mono', monospace; font-size: 9px;
  padding: 5px 12px; border-radius: 2px; cursor: pointer;
  border: 1px solid #444; color: #aaa; background: transparent;
  text-transform: uppercase; letter-spacing:.08em; transition: all .15s;
  margin-left: 8px;
}
.edit-toggle-btn.active { background: #B07A00; border-color: #B07A00; color: #fff; }

/* ── TOOLBAR ── */
.editor-toolbar {
  display: none; align-items: center; gap: 4px; flex-wrap: wrap;
  padding: 8px 12px; background: #FDFBF6;
  border-bottom: 2px solid #B07A00;
  position: sticky; top: 0; z-index: 20;
}
.editor-toolbar.visible { display: flex; }

.tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.tb-btn {
  min-width: 28px; height: 28px; padding: 0 6px;
  border: 1px solid var(--border); border-radius: 3px;
  background: #fff; cursor: pointer; font-size: 12px; font-weight: 700;
  color: var(--sub); display: flex; align-items: center; justify-content: center;
  transition: background .1s, border-color .1s;
}
.tb-btn:hover { background: var(--surface2); border-color: var(--border-strong, #aaa); }
.tb-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

.tb-select {
  height: 28px; padding: 0 6px; border: 1px solid var(--border); border-radius: 3px;
  background: #fff; font-size: 11px; color: var(--sub); cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.tb-color-wrap { position: relative; display: flex; align-items: center; }
.tb-color { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; padding: 2px; background: #fff; }
.tb-color-icon { font-size: 14px; pointer-events: none; }

.tb-label { font-size: 10px; color: var(--muted); margin: 0 2px; letter-spacing:.05em; }

/* ── EDITABLE FIELDS ── */
.edit-mode .detail-section-value[contenteditable="true"] {
  outline: none;
  border: 1.5px solid #B07A00 !important;
  border-radius: 3px;
  padding: 10px 12px;
  min-height: 36px;
  cursor: text;
  transition: border-color .15s;
}
.edit-mode .detail-section-value[contenteditable="true"]:focus {
  border-color: var(--text) !important;
  box-shadow: 0 0 0 2px rgba(176,122,0,.12);
}
.edit-mode .detail-field-label-edit {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.edit-mode-hint {
  font-family: 'DM Mono', monospace; font-size: 8.5px; color: #B07A00;
  letter-spacing: .08em; margin-left: auto;
}

/* ── SAVE / EXPORT PANEL ── */
.edit-action-bar {
  display: none; gap: 8px; padding: 12px 20px;
  background: #FDFBF6; border-top: 1px solid #E8D9AA;
  position: sticky; bottom: 0; z-index: 20;
  flex-wrap: wrap; align-items: center;
}
.edit-action-bar.visible { display: flex; }
.save-btn {
  padding: 8px 18px; border-radius: 3px; border: none; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700;
  transition: all .15s;
}
.save-btn.primary { background: var(--text); color: #fff; }
.save-btn.primary:hover { background: #333; }
.save-btn.secondary { background: #fff; color: var(--sub); border: 1px solid var(--border); }
.save-btn.secondary:hover { background: var(--surface2); }
.save-btn.export { background: #1A6E3C; color: #fff; }
.save-btn.export:hover { background: #155530; }
.save-info { font-size: 11px; color: var(--muted); margin-left: auto; font-family: 'DM Mono', monospace; }

/* ── JSON MODAL ── */
.json-modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 300; align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.json-modal-overlay.open { display: flex; }
.json-modal {
  background: var(--text); color: #E8E4DC;
  width: 700px; max-width: 95vw; max-height: 85vh;
  border-radius: 6px; display: flex; flex-direction: column;
  overflow: hidden;
}
.json-modal-header {
  padding: 16px 20px; border-bottom: 1px solid #333;
  display: flex; align-items: center; gap: 10px;
}
.json-modal-title { font-family: 'DM Mono', monospace; font-size: 11px; color: #A8A49A; }
.json-modal-close {
  margin-left: auto; width: 28px; height: 28px; background: #333;
  border: none; border-radius: 50%; color: #aaa; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
}
.json-textarea {
  flex: 1; background: #111; color: #82C4A0;
  font-family: 'DM Mono', monospace; font-size: 11.5px; line-height: 1.7;
  padding: 16px; border: none; outline: none; resize: none;
  overflow-y: auto;
}
.json-modal-footer {
  padding: 12px 20px; border-top: 1px solid #333;
  display: flex; gap: 8px; align-items: center;
}
.json-copy-btn {
  padding: 7px 16px; background: #1A6E3C; color: #fff;
  border: none; border-radius: 3px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: .08em; text-transform: uppercase;
}
.json-copy-btn:hover { background: #155530; }
.json-dl-btn {
  padding: 7px 16px; background: #1A5A8A; color: #fff;
  border: none; border-radius: 3px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: .08em; text-transform: uppercase;
}
.json-dl-btn:hover { background: #144570; }
.json-modal-hint { font-size: 10px; color: #5A5650; margin-left: auto; }

</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-badge">CRM</span>
  <span class="topbar-title">LF Mall 자동화 메시지 · 고객 여정 대시보드</span>
  <div class="topbar-view-toggle">
    <button class="view-btn active" onclick="setGlobalView('asis', this)">AS-IS</button>
    <button class="view-btn" onclick="setGlobalView('tobe', this)">TO-BE</button>
  </div>
  <span class="topbar-meta">2026.05</span>
  <span class="edit-mode-badge" id="editBadge">✏ 편집 모드</span>
  <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()">편집</button>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-close" onclick="closeDetail()">×</div>

<!-- 리치텍스트 툴바 -->
<div class="editor-toolbar" id="editorToolbar">
  <span class="tb-label">크기</span>
  <select class="tb-select" id="tbFontSize" onchange="execCmd('fontSize', this.value)" title="글자 크기">
    <option value="1">10px</option>
    <option value="2">13px</option>
    <option value="3" selected>16px</option>
    <option value="4">18px</option>
    <option value="5">24px</option>
    <option value="6">32px</option>
  </select>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="tbBold"      onclick="execFmt('bold')"          title="굵게 (Ctrl+B)"><b>B</b></button>
  <button class="tb-btn" id="tbItalic"    onclick="execFmt('italic')"        title="기울임 (Ctrl+I)"><i>I</i></button>
  <button class="tb-btn" id="tbUnderline" onclick="execFmt('underline')"     title="밑줄 (Ctrl+U)"><u>U</u></button>
  <button class="tb-btn" id="tbStrike"    onclick="execFmt('strikeThrough')" title="취소선"><s>S</s></button>
  <div class="tb-sep"></div>
  <span class="tb-label">색</span>
  <div class="tb-color-wrap" title="글자색">
    <input type="color" id="tbTextColor" class="tb-color" value="#1A1917"
      oninput="execCmd('foreColor', this.value)" style="opacity:0;position:absolute;width:28px;height:28px;cursor:pointer;">
    <div class="tb-color-icon" id="tbTextColorIcon" style="pointer-events:none;font-size:18px;line-height:28px;width:28px;text-align:center;border:1px solid var(--border);border-radius:3px;background:#fff;">A</div>
  </div>
  <div class="tb-color-wrap" title="배경색">
    <input type="color" id="tbBgColor" class="tb-color" value="#FFFFFF"
      oninput="execCmd('hiliteColor', this.value)" style="opacity:0;position:absolute;width:28px;height:28px;cursor:pointer;">
    <div class="tb-color-icon" id="tbBgColorIcon" style="pointer-events:none;font-size:16px;line-height:28px;width:28px;text-align:center;border:1px solid var(--border);border-radius:3px;background:#fff;">🖍</div>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="execFmt('removeFormat')" title="서식 제거">✕</button>
</div>
  <div class="detail-header">
    <div class="detail-channel-tag" id="dChannel">
      <span class="detail-ch-dot" id="dChDot"></span>
      <span id="dChLabel"></span>
    </div>
    <div class="detail-code" id="dCode"></div>
    <div class="detail-title" id="dTitle"></div>
    <div class="detail-status-row" id="dStatusRow"></div>
  </div>
  <div class="detail-body" id="dBody"></div>

  <!-- 편집 모드 저장 액션 바 -->
  <div class="edit-action-bar" id="editActionBar">
    <button class="save-btn primary" onclick="saveEdits()">💾 현재 카드 저장</button>
    <button class="save-btn secondary" onclick="resetEdits()">↺ 되돌리기</button>
    <button class="save-btn export" onclick="openJsonModal()">⬇ JSON 내보내기</button>
    <span class="save-info" id="saveInfo">수정 후 저장하면 세션 내 유지됩니다</span>
  </div>

// 편집 모드 상태
// ─────────────────────────────────────────────
let editMode = false;
let currentItemRef = null;   // 현재 열린 카드의 {dataArr, idx} 참조
let editHistory = [];        // 변경 이력

function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('editBadge').classList.toggle('visible', editMode);
  document.getElementById('editToggleBtn').classList.toggle('active', editMode);
  document.getElementById('editorToolbar').classList.toggle('visible', editMode);
  document.getElementById('editActionBar').classList.toggle('visible', editMode && currentItemRef !== null);

  // 편집모드 켜지면 현재 패널 필드를 editable로 전환
  if (currentItemRef) refreshEditableState();
}

function execFmt(cmd) {
  document.execCommand(cmd, false, null);
  updateToolbarState();
}
function execCmd(cmd, val) {
  document.execCommand(cmd, false, val);
}

function updateToolbarState() {
  ['Bold','Italic','Underline','StrikeThrough'].forEach(c => {
    const el = document.getElementById('tb' + c);
    if (el) el.classList.toggle('active', document.queryCommandState(c.toLowerCase()));
  });
}
document.addEventListener('selectionchange', updateToolbarState);

// ── 필드를 contenteditable로 전환 ──
function refreshEditableState() {
  const fields = document.querySelectorAll('.detail-section-value, .detail-title');
  fields.forEach(f => {
    f.contentEditable = editMode ? 'true' : 'false';
    if (editMode) {
      f.addEventListener('focus', () => {
        document.getElementById('editorToolbar').classList.add('visible');
      });
    }
  });
  // 타이밍 필드도 편집 가능
  const timingEl = document.querySelector('.detail-timing-text');
  if (timingEl) timingEl.contentEditable = editMode ? 'true' : 'false';
  document.getElementById('editActionBar').classList.toggle('visible', editMode && currentItemRef !== null);
}

// ── 저장: 편집된 HTML → 원본 데이터 배열에 반영 ──
function saveEdits() {
  if (!currentItemRef) return;
  const { dataArr, idx } = currentItemRef;
  const item = dataArr[idx];

  // 필드 순서: [0]stage [1]ch [2]code [3]label [4]timing [5]trigger [6]offer [7]message [8?]status
  const fields = document.querySelectorAll('.detail-section-value');
  // 타이밍은 .detail-timing-text
  const timingEl = document.querySelector('.detail-timing-text');
  if (timingEl) item[4] = timingEl.textContent.trim();

  // 각 값 필드 순서대로 매핑 (trigger=5, offer=6, message=7)
  const fieldMap = [5, 6, 7];
  fields.forEach((f, i) => {
    if (fieldMap[i] !== undefined) {
      item[fieldMap[i]] = f.innerHTML; // 리치텍스트 유지
    }
  });

  // 카드 라벨 업데이트
  const labelEl = document.querySelector('.detail-title');
  if (labelEl) item[3] = labelEl.textContent.trim();

  editHistory.push({ ts: Date.now(), code: item[2] });
  document.getElementById('saveInfo').textContent =
    `✅ 저장됨 — ${item[2]} (${new Date().toLocaleTimeString('ko-KR')})`;

  // 카드 목록 새로고침
  renderStage(currentStage);
  setTimeout(() => openDetailByIdx(idx, currentItemRef.ch), 50);
}

function resetEdits() {
  if (!currentItemRef) return;
  const { dataArr, idx, snapshot } = currentItemRef;
  if (!snapshot) return;
  dataArr[idx] = [...snapshot];
  renderStage(currentStage);
  setTimeout(() => openDetailByIdx(idx, currentItemRef.ch), 50);
  document.getElementById('saveInfo').textContent = '↺ 원복 완료';
}

// ── JSON 내보내기 ──
function openJsonModal() {
  const out = {
    exported: new Date().toISOString(),
    note: 'ASIS / TOBE 배열을 HTML 파일에 교체하세요',
    ASIS: ASIS,
    TOBE: TOBE,
  };
  document.getElementById('jsonTextarea').value =
    JSON.stringify(out, null, 2);
  document.getElementById('jsonModal').classList.add('open');
}
function closeJsonModal() {
  document.getElementById('jsonModal').classList.remove('open');
}
function copyJson() {
  const ta = document.getElementById('jsonTextarea');
  ta.select();
  document.execCommand('copy');
  const btn = document.querySelector('.json-copy-btn');
  btn.textContent = '✅ 복사됨!';
  setTimeout(() => btn.textContent = '클립보드 복사', 1500);
}
function downloadJson() {
  const blob = new Blob([document.getElementById('jsonTextarea').value], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `lfmall_crm_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

}

function updateStageCounts() {
  for (let i = 0; i < 5; i++) {
    const asisN = ASIS.filter(d => d[0] === i).length;
    const tobeN = TOBE.filter(d => d[0] === i).length;
    document.getElementById('cnt' + i).textContent =
      currentView === 'asis' ? asisN : tobeN;
  }
}

// ─────────────────────────────────────────────
// 여정 단계 선택
// ─────────────────────────────────────────────
function selectStage(idx, btn) {
  currentStage = idx;
  document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // active border-left 색
  const stages = document.querySelectorAll('.stage-btn');
  stages.forEach((b, i) => {
    b.style.borderLeftColor = 'transparent';
  });
  btn.style.borderLeftColor = STAGES[idx].color;

  closeDetail();
  renderStage(idx);
}

// ─────────────────────────────────────────────
// 글로벌 뷰 전환 (AS-IS / TO-BE)
// ─────────────────────────────────────────────
function setGlobalView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateStageCounts();
  closeDetail();
  renderStage(currentStage);
}

// ─────────────────────────────────────────────
// 메인 렌더링
// ─────────────────────────────────────────────
function renderStage(idx) {
  window._cardData = []; // 탭 전환 시마다 초기화
  const stage = STAGES[idx];
  const data   = currentView === 'asis' ? ASIS : TOBE;
  const items  = data.filter(d => d[0] === idx);

  // 채널 순서
  const chOrder = ['sms','alimtok','push','inapp'];

  // 변경 유형 카운트 (to-be 전용)
  const counts = {};
  if (currentView === 'tobe') {
    items.forEach(d => { counts[d[8]] = (counts[d[8]] || 0) + 1; });
  }

  let html = '';

  // ── 헤더 ──
  html += `<div class="stage-header">
    <span class="stage-header-dot" style="background:${stage.color}"></span>
    <span class="stage-header-label">${stage.label}</span>
    <div class="stage-header-meta">
      <div class="stage-stat">
        <div class="stage-stat-num" style="color:${stage.color}">${items.length}</div>
        <div class="stage-stat-label">${currentView === 'asis' ? 'AS-IS 캠페인' : 'TO-BE 캠페인'}</div>
      </div>
    </div>
  </div>`;

  // ── GAP 배지 ──
  html += `<div class="gap-badge">⚠️ GAP &nbsp;|&nbsp; ${stage.gap}</div>`;

  // ── TO-BE 변경 요약 바 ──
  if (currentView === 'tobe') {
    html += `<div class="summary-bar">`;
    const types = [
      {k:'new', label:'신규 추가', color:'#1A6E3C'},
      {k:'mod', label:'수정·개선', color:'#1A5A8A'},
      {k:'keep',label:'유지',      color:'#5A5650'},
      {k:'del', label:'삭제검토',  color:'#C8381A'},
    ];
    types.forEach(t => {
      const n = counts[t.k] || 0;
      html += `<div class="summary-cell">
        <div class="summary-num" style="color:${t.color}">${n}</div>
        <div class="summary-lbl">${t.label}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── 채널별 카드 ──
  chOrder.forEach(ch => {
    const chItems = items.filter(d => d[1] === ch);
    if (!chItems.length) return;

    const chInfo = CH[ch];
    html += `<div class="channel-group">
      <div class="channel-header">
        <span class="channel-bar" style="background:${chInfo.color}"></span>
        <span class="channel-label" style="color:${chInfo.color}">${chInfo.label}</span>
        <span class="channel-badge" style="background:${chInfo.color}18;color:${chInfo.color};border:1px solid ${chInfo.color}30">
          ${chItems.length}건
        </span>
      </div>
      <div class="cards">`;

    chItems.forEach((item, i) => {
      const isAsis = currentView === 'asis';
      const code    = item[2];
      const label   = item[3];
      const timing  = item[4];
      const status  = isAsis ? null : item[8];
      const st      = status ? STATUS[status] : null;
      const delay   = `animation-delay:${i * 0.04}s`;

      // 전역 배열에 저장, data-idx로만 참조 (한글/이모지 onclick 직렬화 버그 방지)
      const gIdx = window._cardData.push(item) - 1;

      html += `<div class="card" style="${delay}" onclick="openDetailByIdx(${gIdx},'${ch}')">
        <div class="card-top">
          <span class="card-code">${code}</span>
          <span class="card-label">${label}</span>
          ${st ? `<span class="card-status ${st.cls}">${st.label}</span>` : ''}
        </div>
        <div class="card-bottom">
          <span class="card-timing">⏱ ${timing}</span>
          <span class="card-expand">→ 자세히</span>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

// ─────────────────────────────────────────────
// 전역 카드 데이터 스토어 (renderStage 호출마다 리셋)
// ─────────────────────────────────────────────
window._cardData = [];

function openDetailByIdx(idx, ch) {
  const item = window._cardData[idx];
  if (!item) { console.warn('card not found', idx); return; }
  openDetail(item, ch);
}

// ─────────────────────────────────────────────
// 디테일 패널
// ─────────────────────────────────────────────
function openDetail(item, ch) {
  const isAsis = currentView === 'asis';
  // asis: [stage,ch,code,label,timing,trigger,offer,message]
  // tobe: [stage,ch,code,label,timing,trigger,offer,message,status]
  const [stage, , code, label, timing, trigger, offer, message, status] = item;

  const chInfo = CH[ch] || CH['sms'];
  const st     = (status && !isAsis) ? STATUS[status] : null;

  // 헤더
  document.getElementById('dChDot').style.background   = chInfo.color;
  document.getElementById('dChLabel').textContent       = chInfo.label;
  document.getElementById('dChLabel').style.color       = chInfo.color;
  document.getElementById('dCode').textContent          = code;
  document.getElementById('dTitle').textContent         = label;

  // 상태 뱃지
  const statusRow = document.getElementById('dStatusRow');
  statusRow.innerHTML = st
    ? `<span class="card-status ${st.cls}">${st.label}</span>`
    : `<span style="font-size:10px;color:var(--muted)">AS-IS 현재 운영</span>`;

  // 바디
  let body = `
    <div class="detail-section">
      <div class="detail-section-label">⏱ 발송 타이밍</div>
      <div class="detail-timing">
        <span class="detail-timing-icon">📅</span>
        <span class="detail-timing-text">${timing}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">🎯 트리거 조건</div>
      <div class="detail-section-value">${trigger}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">🎁 오퍼 / 혜택</div>
      <div class="detail-section-value highlight">${offer}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">💬 메시지 / 문구</div>
      <div class="detail-section-value message">${message}</div>
    </div>`;

  document.getElementById('dBody').innerHTML = body;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('active');

  // 편집 모드 참조 저장
  const dataArr = currentView === 'asis' ? ASIS : TOBE;
  currentItemRef = { dataArr, idx: window._cardData.indexOf(item), ch, snapshot: [...item] };
  refreshEditableState();
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  activeCard = null;
  currentItemRef = null;
  document.getElementById('editActionBar').classList.remove('visible');
}

// ─────────────────────────────────────────────
// 시작
// ─────────────────────────────────────────────
init();

// 초기 active 상태 스타일
document.getElementById('stageBtn0').style.borderLeftColor = STAGES[0].color;

</script>

<!-- JSON 내보내기 모달 -->
<div class="json-modal-overlay" id="jsonModal">
  <div class="json-modal">
    <div class="json-modal-header">
      <span class="json-modal-title">📋 수정된 데이터 JSON 내보내기</span>
      <button class="json-modal-close" onclick="closeJsonModal()">×</button>
    </div>
    <textarea class="json-textarea" id="jsonTextarea" readonly></textarea>
    <div class="json-modal-footer">
      <button class="json-copy-btn" onclick="copyJson()">클립보드 복사</button>
      <button class="json-dl-btn" onclick="downloadJson()">⬇ .json 다운로드</button>
      <span class="json-modal-hint">이 JSON을 HTML 파일의 ASIS / TOBE 배열에 붙여넣으세요</span>
    </div>
  </div>
</div>

</body>
</html>
