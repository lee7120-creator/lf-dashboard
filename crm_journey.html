<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LF Mall CRM 고객 여정 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F6FA;--surface:#FFF;--border:#E2E6F0;
  --text:#1C1B19;--sub:#4E4D48;--muted:#96938C;
  --sms-c:#B83A3A;--sms-bg:#FEF2F2;
  --ali-c:#A07010;--ali-bg:#FEF8EA;
  --fri-c:#367A4C;--fri-bg:#EEF8F1;
  --eml-c:#2E68B0;--eml-bg:#EEF3FA;
  --new-c:#367A4C;--new-bg:#EBF8F2;--new-b:#B4DEC8;
  --mod-c:#2E68B0;--mod-bg:#EEF3FA;--mod-b:#B4CCE8;
  --kep-c:#706E68;--kep-bg:#F2F1EE;--kep-b:#D8D6CE;
  --del-c:#B03030;--del-bg:#FEF1F0;--del-b:#E8C0BC;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.5}

/* ── Topbar ── */
.topbar{position:sticky;top:0;z-index:200;background:#1C1B19;display:flex;align-items:center;gap:10px;padding:0 20px;height:48px;border-bottom:1px solid #333}
.tb-logo{display:flex;align-items:center;gap:8px}
.tb-icon{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#9070C8,#C080A0);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;letter-spacing:-.03em}
.tb-title{font-size:11.5px;color:#A8A4A0}
.tb-sep{flex:1}
.tb-saved{font-family:'DM Mono',monospace;font-size:9px;color:#70A880;display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .4s}
.tb-saved.show{opacity:1}
.tb-saved-dot{width:6px;height:6px;border-radius:50%;background:#70A880}
.tb-btn{padding:5px 11px;border-radius:6px;border:1px solid #363432;background:transparent;color:#A8A4A0;cursor:pointer;font-size:11px;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:#282624;border-color:#555;color:#E0DDD8}
#importInput{display:none}

/* ── Content ── */
.content{padding:18px 22px 60px}

/* ── Stage Section ── */
.stage-section{margin-bottom:14px;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stage-head{padding:13px 18px;color:#fff;display:flex;align-items:center;gap:8px;position:relative;user-select:none}
.stage-head-label{font-size:14px;font-weight:700;letter-spacing:-.01em;cursor:text;flex:1;padding:2px 0}
.stage-head-label-input{font-size:14px;font-weight:700;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);border-radius:5px;color:#fff;padding:2px 8px;font-family:'Noto Sans KR',sans-serif;outline:none;flex:1;min-width:140px}
.stage-head-mosu{font-family:'DM Mono',monospace;font-size:9px;opacity:.6;cursor:text;padding:2px 0}
.stage-head-mosu-input{font-family:'DM Mono',monospace;font-size:9px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:4px;color:#fff;padding:1px 6px;outline:none;width:100px}
.stage-color-btn{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.45);background:rgba(255,255,255,.18);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.stage-color-btn:hover{background:rgba(255,255,255,.32)}
.stage-head:hover .stage-color-btn{display:flex}
#stageColorPicker{position:fixed;opacity:0;pointer-events:none;width:0;height:0}

/* ── Gap Row ── */
.gap-row{padding:7px 18px;background:#FFFCF0;border-bottom:1px solid #F0E4A0;font-size:11.5px;color:#8A7030;display:flex;align-items:flex-start;gap:5px}
.gap-icon{flex-shrink:0;margin-top:1px}
.gap-text{flex:1;cursor:text}
.gap-text-input{flex:1;font-size:11.5px;color:#8A7030;background:transparent;border:none;border-bottom:1.5px dashed #C0A060;outline:none;font-family:'Noto Sans KR',sans-serif;width:100%}

/* ── View Rows ── */
.view-row{padding:12px 18px 14px;background:var(--surface)}
.view-row.tobe{background:#FAFBFE}
.row-meta{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.row-label{font-family:'DM Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.row-count{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid transparent}
.mid-divider{height:1px;background:#D8DCE8}

/* ── Cards ── */
.cards-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;align-items:flex-start}
.cards-scroll::-webkit-scrollbar{height:4px}
.cards-scroll::-webkit-scrollbar-thumb{background:#D0D4DE;border-radius:2px}

.card{flex:0 0 210px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:grab;transition:box-shadow .15s,transform .1s;position:relative;border-left:3px solid #ccc}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.09);transform:translateY(-1px)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.4;box-shadow:none}
.card.drop-before{box-shadow:-3px 0 0 0 #7B6BC8}
.card.drop-after{box-shadow:3px 0 0 0 #7B6BC8}
.cards-scroll.drop-hot{outline:2px dashed #B4B0D8;outline-offset:-3px;border-radius:8px;background:rgba(123,107,200,.04)}
.card-badges{display:flex;align-items:center;gap:4px;margin-bottom:7px;flex-wrap:wrap;row-gap:4px}
.ch-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:.02em;border:1px solid transparent;white-space:nowrap;flex-shrink:0}
.push-badge{font-size:8.5px;padding:2px 6px;border-radius:8px;background:#3A3E46;color:#E8E4DE;font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}
.status-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;cursor:pointer;user-select:none;border:1px solid transparent;transition:opacity .1s;white-space:nowrap;flex-shrink:0}
.status-badge:hover{opacity:.75}
.card-code{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.card-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.card:hover .card-actions{opacity:1}
.act-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .1s}
.act-btn:hover{background:var(--bg);border-color:#C0C4CC}
.act-del:hover{background:#FEF1F0;color:#B03030;border-color:#E8C0BC}
.card-label{font-size:11.5px;font-weight:600;margin-bottom:5px;line-height:1.4}
.card-timing{font-family:'DM Mono',monospace;font-size:10px;color:var(--text);font-weight:500}
.add-btn{flex:0 0 40px;height:86px;border:1.5px dashed #C8CCDA;border-radius:10px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#B4B8C4;transition:all .15s}
.add-btn:hover{border-color:#8A8E9A;color:#606470;background:rgba(0,0,0,.012)}

/* ── Detail Panel ── */
.det-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:140;backdrop-filter:blur(1px)}
.det-overlay.on{display:block}
.det-panel{position:fixed;right:0;top:48px;bottom:0;width:380px;background:#fff;border-left:1px solid var(--border);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:150;display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 24px rgba(0,0,0,.08)}
.det-panel.on{transform:translateX(0)}
.det-close{position:absolute;top:12px;right:12px;width:28px;height:28px;background:#F0F2F6;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--muted);z-index:10;transition:all .1s}
.det-close:hover{background:var(--border)}
.det-head{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.det-code{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px}
.det-title{font-size:15px;font-weight:700;margin-bottom:8px}
.det-body{padding:14px 18px;overflow-y:auto;flex:1}
.det-lbl{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:12px;margin-bottom:4px}
.det-lbl:first-child{margin-top:0}
.det-val{background:#F5F7FC;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--sub);line-height:1.7;white-space:pre-wrap;word-break:keep-all}
.det-val.hl{border-left:3px solid #2E68B0;background:#EEF3FA}
.det-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── Modal ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-ov.on{display:flex}
.modal{background:#fff;border-radius:14px;width:540px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.18)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head-title{font-size:14px;font-weight:700}
.modal-x{width:28px;height:28px;border:1px solid var(--border);border-radius:50%;background:#F4F5F8;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .1s}
.modal-x:hover{background:var(--border)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.form-row{display:flex;gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;flex:1}
.fg.half{flex:.5}
.fg label{font-size:9.5px;font-weight:600;color:var(--muted);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;background:#fff;width:100%;transition:border-color .15s,box-shadow .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#9AAAC8;box-shadow:0 0 0 3px rgba(46,104,176,.08)}
.fg textarea{resize:vertical}
.push-wrap{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;user-select:none;height:35px;transition:border-color .15s}
.push-wrap:hover{border-color:#9AAAC8}
.push-wrap input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#3A3E46}
.push-wrap span{font-size:12px}
.st-btns{display:flex;gap:6px;flex-wrap:wrap}
.st-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);transition:all .12s}
.st-btn.on-new{background:var(--new-bg);color:var(--new-c);border-color:var(--new-b)}
.st-btn.on-mod{background:var(--mod-bg);color:var(--mod-c);border-color:var(--mod-b)}
.st-btn.on-kep{background:var(--kep-bg);color:var(--kep-c);border-color:var(--kep-b)}
.st-btn.on-del{background:var(--del-bg);color:var(--del-c);border-color:var(--del-b)}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .15s}
.btn-primary{background:#1C1B19;color:#fff}
.btn-primary:hover{background:#333330}
.btn-ghost{background:#fff;color:var(--sub);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#D0D4DE;border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">
    <div class="tb-icon">LF</div>
    <span class="tb-title">LF Mall CRM · 고객 여정 대시보드</span>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-saved" id="tbSaved"><div class="tb-saved-dot"></div><span>저장됨</span></div>
  <button class="tb-btn" onclick="exportJSON()">💾 내보내기</button>
  <button class="tb-btn" onclick="document.getElementById('importInput').click()">📂 불러오기</button>
  <input type="file" id="importInput" accept=".json" onchange="importJSON(event)">
</div>

<div class="content" id="content"></div>

<div class="det-overlay" id="detOv" onclick="closeDet()"></div>
<div class="det-panel" id="detPanel">
  <div class="det-close" onclick="closeDet()">×</div>
  <div id="detContent" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
</div>

<div class="modal-ov" id="modalOv">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-head-title" id="modalTitle">캠페인 추가</span>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="fg half"><label>AF코드</label><input id="fCode" type="text" placeholder="예: AF-LL01"></div>
        <div class="fg half"><label>발송 채널</label>
          <select id="fCh">
            <option value="sms">📱 SMS</option>
            <option value="alimtok">💬 알림톡</option>
            <option value="friends">💚 플친메시지</option>
            <option value="email">✉️ 이메일</option>
            <option value="inapp">📲 인앱메시지</option>
            <option value="none">∅ 없음</option>
          </select>
        </div>
      </div>
      <div class="form-row"><div class="fg"><label>캠페인명</label><input id="fLabel" type="text" placeholder="캠페인명을 입력하세요"></div></div>
      <div class="form-row">
        <div class="fg half"><label>발송 타이밍</label><input id="fTiming" type="text" placeholder="예: 가입 D+1 · 구매 D+7 · 실시간"></div>
        <div class="fg half"><label>&nbsp;</label>
          <label class="push-wrap"><input type="checkbox" id="fPush"><span>🔔 PUSH 병행</span></label>
        </div>
      </div>
      <div class="form-row" id="fStatusRow">
        <div class="fg"><label>변경 유형 (TO-BE)</label>
          <div class="st-btns" id="fStatusBtns">
            <button class="st-btn" data-s="new"  onclick="pickStatus('new')">신규추가</button>
            <button class="st-btn" data-s="mod"  onclick="pickStatus('mod')">수정개선</button>
            <button class="st-btn" data-s="kep"  onclick="pickStatus('kep')">유지</button>
            <button class="st-btn" data-s="del"  onclick="pickStatus('del')">삭제검토</button>
          </div>
        </div>
      </div>
      <div class="form-row"><div class="fg"><label>트리거 조건</label><textarea id="fTrigger" rows="2" placeholder="발송 조건"></textarea></div></div>
      <div class="form-row"><div class="fg"><label>오퍼 / 혜택</label><textarea id="fOffer" rows="2" placeholder="제공 혜택"></textarea></div></div>
      <div class="form-row"><div class="fg"><label>메시지 / 문구</label><textarea id="fMessage" rows="4" placeholder="발송 메시지 문구"></textarea></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<input type="color" id="stageColorPicker" style="position:fixed;opacity:0;pointer-events:none;width:0;height:0">

<script>
const CH={
  sms:    {label:'SMS',    c:'#B83A3A',bg:'#FEF2F2',icon:'📱'},
  alimtok:{label:'알림톡',c:'#A07010',bg:'#FEF8EA',icon:'💬'},
  friends:{label:'플친',  c:'#367A4C',bg:'#EEF8F1',icon:'💚'},
  email:  {label:'이메일',c:'#2E68B0',bg:'#EEF3FA',icon:'✉️'},
  inapp:  {label:'인앱',  c:'#7B5BC0',bg:'#F3EFFB',icon:'📲'},
  none:   {label:'없음',  c:'#96938C',bg:'#F2F1EE',icon:'∅'},
};
const ST={
  new:{label:'신규추가',c:'#367A4C',bg:'#EBF8F2',b:'#B4DEC8'},
  mod:{label:'수정개선',c:'#2E68B0',bg:'#EEF3FA',b:'#B4CCE8'},
  kep:{label:'유지',    c:'#706E68',bg:'#F2F1EE',b:'#D8D6CE'},
  del:{label:'삭제검토',c:'#B03030',bg:'#FEF1F0',b:'#E8C0BC'},
};
const ST_ORDER=['new','mod','kep','del'];
const STORE_KEY='lfmall_crm_v3';

let STAGES=[
  {id:0,label:'가입 / 미구매',      color:'#7B6BC8',mosu:'33,167명/월',gap:'골든타임(0~2h) 트리거 공백 — 첫 접점이 가입 D+1 SMS'},
  {id:1,label:'탐색 / 구매결정',    color:'#C86868',mosu:'상시',       gap:'주문서(결제창) 이탈 대응 전무 — PUSH 동의율 순증 –300명/월'},
  {id:2,label:'1회구매 → 재구매',   color:'#5080C0',mosu:'29,647명/월',gap:'배송완료→D+7 사이 7일 공백 — 리뷰 유도·알림톡 미활용'},
  {id:3,label:'2회구매 → VIP 이관', color:'#B8900A',mosu:'17,791명/월',gap:'3회 구매 후 VIP 이관 자동화 없음 — 등급 넛지(인앱) 전무'},
  {id:4,label:'VIP / Win-back',     color:'#488C5C',mosu:'24,195명/월',gap:'일반 고객 Win-back 시퀀스 전무 — EV00 VIP 30일 미방문만 대응'},
];

let _uid=1000;
function uid(){return 'c'+(++_uid);}

let CARDS=[
  {id:uid(),stage:0,v:'asis',ch:'alimtok',push:false,code:'K0400',label:'통합회원 전환 완료 안내',timing:'전환 즉시',trigger:'통합회원 전환 완료 시',offer:'LF Members 멤버십 혜택 안내',msg:'LF Members 통합회원 전환이 완료되었습니다.\n멤버십 혜택을 확인하고 즐거운 쇼핑하세요!'},

// ── localStorage ──
function loadData(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(d._uid)_uid=d._uid;
    if(Array.isArray(d.cards))CARDS=d.cards;
    if(Array.isArray(d.stages)){
      d.stages.forEach(s=>{
        const t=STAGES.find(x=>x.id===s.id);
        if(t){if(s.color)t.color=s.color;if(s.label)t.label=s.label;if(s.gap)t.gap=s.gap;if(s.mosu)t.mosu=s.mosu;}
      });
    }
  }catch(e){console.warn('load failed',e);}
}

let _saveTimer=null;
function saveData(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(STORE_KEY,JSON.stringify({cards:CARDS,stages:STAGES,_uid,ts:Date.now()}));
      const el=document.getElementById('tbSaved');
      el.classList.add('show');
      setTimeout(()=>el.classList.remove('show'),2200);
    }catch(e){}
  },400);
}

function exportJSON(){
  const blob=new Blob([JSON.stringify({cards:CARDS,stages:STAGES,_uid,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='lfmall-crm-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(Array.isArray(d.cards))CARDS=d.cards;
      if(Array.isArray(d.stages))d.stages.forEach(s=>{const t=STAGES.find(x=>x.id===s.id);if(t)Object.assign(t,s);});
      if(d._uid)_uid=d._uid;
      ensureOrder();render();saveData();
      alert('데이터를 성공적으로 불러왔습니다.');
    }catch(ex){alert('JSON 파일을 읽을 수 없습니다.');}
  };
  r.readAsText(f);
  e.target.value='';
}

function editStageLabel(id,e){
  e.stopPropagation();
  const el=document.getElementById('slabel-'+id);if(!el)return;
  const stage=STAGES.find(s=>s.id===id);if(!stage)return;
  const inp=document.createElement('input');
  inp.type='text';inp.value=stage.label;inp.className='stage-head-label-input';
  el.replaceWith(inp);inp.focus();inp.select();
  function save(){stage.label=inp.value.trim()||stage.label;render();saveData();}
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();save();}if(ev.key==='Escape')render();});

// ── Timing sort ──
function timingNum(t){
  if(!t)return 999;const s=t.toLowerCase();
  if(s.includes('실시간'))return -1;
  if(s.includes('방송')&&s.includes('전'))return -0.5;
  if(s==='즉시'||s.includes('즉시'))return 0;
  const hm=s.match(/(\d+)\s*시간|(\d+)h/);if(hm)return parseInt(hm[1]||hm[2])/24;
  if(s.includes('배송완료')){const m=s.match(/d\+(\d+)/i);return m?parseFloat(m[1]):0.1;}
  const dm=s.match(/d\+(\d+)/i);if(dm)return parseFloat(dm[1]);
  if(s.includes('이탈 후 d+'))return 1.5;
  if(s.includes('이탈 후 1시간'))return 0.04;
  if(s.includes('90일'))return 90;if(s.includes('180일'))return 180;if(s.includes('270일'))return 270;
  if(s.includes('100일'))return 100;
  if(s.includes('매월')){const m=s.match(/(\d+)일/);return m?parseInt(m[1]):30;}
  if(s.includes('매일'))return 30;
  return 999;
}

// ── Ordering (drag & drop friendly) ──
// Cards sort by explicit `ord`; on first load `ord` is seeded from timing order
// so the initial view stays time-sorted, but drag-drop can override freely.
function ordOf(c){return (typeof c.ord==='number')?c.ord:timingNum(c.timing)*1000;}
function ensureOrder(){
  STAGES.forEach(s=>['asis','tobe'].forEach(v=>{
    const grp=CARDS.filter(c=>c.stage===s.id&&c.v===v);
    if(grp.some(c=>typeof c.ord!=='number')){
      grp.sort((a,b)=>timingNum(a.timing)-timingNum(b.timing)).forEach((c,i)=>c.ord=i*10);
    }
  }));
}

// ── Render ──
function render(){
  document.getElementById('content').innerHTML=STAGES.map(renderStage).join('');
}

function renderStage(stage){
  const asis=[...CARDS.filter(c=>c.stage===stage.id&&c.v==='asis')].sort((a,b)=>ordOf(a)-ordOf(b));
  const tobe=[...CARDS.filter(c=>c.stage===stage.id&&c.v==='tobe')].sort((a,b)=>ordOf(a)-ordOf(b));
  const cnt={new:0,mod:0,kep:0,del:0};
  tobe.forEach(c=>{if(c.status&&cnt[c.status]!==undefined)cnt[c.status]++;});
  const stCounts=['new','mod','kep','del'].map(k=>cnt[k]>0
    ?`<span class="row-count" style="background:${ST[k].bg};color:${ST[k].c};border-color:${ST[k].b}">${ST[k].label} ${cnt[k]}</span>`
    :'').join('');
  const c30=stage.color+'30',c50=stage.color+'50';
  return `<div class="stage-section">
    <div class="stage-head" style="background:${stage.color}">
      <div class="stage-head-label" id="slabel-${stage.id}" onclick="editStageLabel(${stage.id},event)" title="클릭하여 편집">${stage.label}</div>
      <span class="stage-head-mosu" id="smosu-${stage.id}" onclick="editStageMosu(${stage.id},event)" title="클릭하여 편집">${stage.mosu}</span>
      <button class="stage-color-btn" onclick="openColorPicker(${stage.id},event)" title="헤더 색상 변경">🎨</button>
    </div>
    <div class="gap-row">
      <span class="gap-icon">⚠</span>
      <span class="gap-text" id="gaptext-${stage.id}" onclick="editGapText(${stage.id},event)" title="클릭하여 편집">${stage.gap}</span>
    </div>
    <div class="view-row">
      <div class="row-meta">
        <span class="row-label" style="color:#9A9890">AS-IS</span>
        <span class="row-count" style="background:#EDEEF4;color:#9A9890;border-color:#DDE0EA">${asis.length}건</span>
      </div>
      <div class="cards-scroll" data-stage="${stage.id}" data-view="asis" ondragover="dragOverRow(event)" ondragleave="dragLeaveRow(event)" ondrop="dropOnRow(event)">${asis.map(c=>cardHTML(c)).join('')}<button class="add-btn" onclick="openAdd('asis',${stage.id})">+</button></div>
    </div>
    <div class="mid-divider"></div>
    <div class="view-row tobe">
      <div class="row-meta">
        <span class="row-label" style="color:${stage.color}">TO-BE</span>
        <span class="row-count" style="background:${c30};color:${stage.color};border-color:${c50}">${tobe.length}건</span>
        ${stCounts}
      </div>
      <div class="cards-scroll" data-stage="${stage.id}" data-view="tobe" ondragover="dragOverRow(event)" ondragleave="dragLeaveRow(event)" ondrop="dropOnRow(event)">${tobe.map(c=>cardHTML(c)).join('')}<button class="add-btn" onclick="openAdd('tobe',${stage.id})">+</button></div>
    </div>
  </div>`;
}

function cardHTML(c){
  const ch=CH[c.ch]||CH.sms;
  const st=c.status?ST[c.status]:null;
  const stBadge=st
    ?`<span class="status-badge" style="background:${st.bg};color:${st.c};border-color:${st.b}" onclick="cycleStatus('${c.id}',event)">${st.label}</span>`
    :'';
  return `<div class="card" draggable="true" style="border-left-color:${ch.c}" onclick="openDet('${c.id}')"
    ondragstart="dragStart(event,'${c.id}')" ondragend="dragEnd(event)"
    ondragover="dragOverCard(event)" ondragleave="dragLeaveCard(event)" ondrop="dropOnCard(event,'${c.id}')">
    <div class="card-badges">
      ${c.push?'<span class="push-badge">🔔 PUSH</span>':''}
      <span class="ch-badge" style="background:${ch.bg};color:${ch.c};border-color:${ch.c}30">${ch.icon} ${ch.label}</span>
      ${stBadge}
    </div>
    <div class="card-code"><span>${c.code}</span>
      <span class="card-actions">
        <button class="act-btn" onclick="openEdit('${c.id}',event)" title="편집">✏</button>
        <button class="act-btn act-del" onclick="delCard('${c.id}',event)" title="삭제">×</button>
      </span>
    </div>
    <div class="card-label">${c.label}</div>
    <div class="card-timing">⏱ ${c.timing}</div>
  </div>`;
}

      <div class="det-lbl">🎯 트리거 조건</div><div class="det-val">${c.trigger||'—'}</div>
      <div class="det-lbl">🎁 오퍼 / 혜택</div><div class="det-val hl">${c.offer||'—'}</div>
      <div class="det-lbl">💬 메시지 / 문구</div><div class="det-val">${(c.msg||'—').replace(/\n/g,'<br>')}</div>
    </div>
    <div class="det-foot">
      <button class="btn btn-primary" onclick="openEdit('${c.id}')">✏ 편집</button>
      <button class="btn btn-ghost" onclick="delCard('${c.id}')">삭제</button>
    </div>`;
  document.getElementById('detPanel').classList.add('on');
  document.getElementById('detOv').classList.add('on');
}
function closeDet(){
  document.getElementById('detPanel').classList.remove('on');
  document.getElementById('detOv').classList.remove('on');
}

// ── Status cycle ──
function cycleStatus(id,e){
  e&&e.stopPropagation();
  const c=CARDS.find(x=>x.id===id);if(!c||!c.status)return;
  c.status=ST_ORDER[(ST_ORDER.indexOf(c.status)+1)%ST_ORDER.length];
  render();saveData();
}

// ── Drag & Drop ──
let _dragId=null;
function dragStart(e,id){
  _dragId=id;
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain',id);}catch(_){}
  e.currentTarget.classList.add('dragging');
}
function dragEnd(){
  _dragId=null;
  document.querySelectorAll('.card.dragging').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.card.drop-before,.card.drop-after').forEach(c=>c.classList.remove('drop-before','drop-after'));
  document.querySelectorAll('.cards-scroll.drop-hot').forEach(c=>c.classList.remove('drop-hot'));
}
function dragOverCard(e){
  if(!_dragId)return;
  e.preventDefault();e.stopPropagation();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  const rect=card.getBoundingClientRect();
  const after=(e.clientX-rect.left)>rect.width/2;
  card.classList.toggle('drop-after',after);
  card.classList.toggle('drop-before',!after);
}
function dragLeaveCard(e){e.currentTarget.classList.remove('drop-before','drop-after');}
function dropOnCard(e,targetId){
  if(!_dragId)return;
  e.preventDefault();e.stopPropagation();
  const card=e.currentTarget;
  const rect=card.getBoundingClientRect();
  const after=(e.clientX-rect.left)>rect.width/2;
  card.classList.remove('drop-before','drop-after');
  if(_dragId===targetId)return;
  const t=CARDS.find(c=>c.id===targetId);if(!t)return;
  moveCard(_dragId,t.stage,t.v,targetId,after);
}
function dragOverRow(e){
  if(!_dragId)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drop-hot');
}
function dragLeaveRow(e){
  if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drop-hot');
}
function dropOnRow(e){
  if(!_dragId)return;
  e.preventDefault();
  const row=e.currentTarget;row.classList.remove('drop-hot');
  moveCard(_dragId,parseInt(row.dataset.stage),row.dataset.view,null,true);
}
function moveCard(dragId,stage,view,beforeAfterId,after){
  const c=CARDS.find(x=>x.id===dragId);if(!c)return;
  const changedView=(c.v!==view);
  c.stage=stage;c.v=view;
  if(changedView){
    if(view==='tobe'&&!c.status)c.status='kep';   // 신규 TO-BE 칸으로 옮기면 기본 '유지'
    if(view==='asis')delete c.status;             // AS-IS 칸은 상태 뱃지 없음
  }
  let group=CARDS.filter(x=>x.stage===stage&&x.v===view&&x.id!==dragId).sort((a,b)=>ordOf(a)-ordOf(b));
  let idx=group.length;
  if(beforeAfterId){
    const ti=group.findIndex(x=>x.id===beforeAfterId);
    if(ti>=0)idx=after?ti+1:ti;
  }
  group.splice(idx,0,c);
  group.forEach((g,i)=>g.ord=i*10);
  render();saveData();
}

// ── Modal ──
let _editId=null,_editView=null,_editStage=null,_curStatus='new';
function openAdd(view,stage){
  _editId=null;_editView=view;_editStage=stage;_curStatus='new';
  document.getElementById('modalTitle').textContent='캠페인 추가';
  ['fCode','fLabel','fTiming','fTrigger','fOffer','fMessage'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fCh').value='sms';
  document.getElementById('fPush').checked=false;
  document.getElementById('fStatusRow').style.display=view==='tobe'?'':'none';
  hlStatus('new');
  document.getElementById('modalOv').classList.add('on');
}
function openEdit(id,e){
  e&&e.stopPropagation();
  const c=CARDS.find(x=>x.id===id);if(!c)return;
  _editId=id;_editView=c.v;_editStage=c.stage;_curStatus=c.status||'kep';
  document.getElementById('modalTitle').textContent='캠페인 편집';
  document.getElementById('fCode').value=c.code||'';
  document.getElementById('fCh').value=c.ch||'sms';
  document.getElementById('fLabel').value=c.label||'';
  document.getElementById('fTiming').value=c.timing||'';
  document.getElementById('fPush').checked=!!c.push;
  document.getElementById('fTrigger').value=c.trigger||'';
  document.getElementById('fOffer').value=c.offer||'';
  document.getElementById('fMessage').value=c.msg||'';
  document.getElementById('fStatusRow').style.display=c.v==='tobe'?'':'none';
  hlStatus(_curStatus);
  closeDet();
  document.getElementById('modalOv').classList.add('on');
}
function saveCard(){
  const label=document.getElementById('fLabel').value.trim();
  if(!label){alert('캠페인명을 입력하세요.');return;}
  const data={
    code:document.getElementById('fCode').value.trim(),
    ch:document.getElementById('fCh').value,
    label,
    timing:document.getElementById('fTiming').value.trim(),
    push:document.getElementById('fPush').checked,
    trigger:document.getElementById('fTrigger').value.trim(),
    offer:document.getElementById('fOffer').value.trim(),
    msg:document.getElementById('fMessage').value.trim(),
  };
  if(_editId){
    const c=CARDS.find(x=>x.id===_editId);
    if(c){Object.assign(c,data);if(c.v==='tobe')c.status=_curStatus;}
  }else{
    const nc={id:uid(),stage:_editStage,v:_editView,...data};
    if(_editView==='tobe')nc.status=_curStatus;
    const grp=CARDS.filter(x=>x.stage===_editStage&&x.v===_editView);
    nc.ord=grp.length?Math.max(...grp.map(x=>ordOf(x)))+10:0;
    CARDS.push(nc);
  }
  closeModal();render();saveData();
}
function delCard(id,e){
  e&&e.stopPropagation();
  const c=CARDS.find(x=>x.id===id);if(!c)return;
  if(!confirm('"'+c.label+'" 캠페인을 삭제하시겠습니까?'))return;
  CARDS=CARDS.filter(x=>x.id!==id);
  closeDet();render();saveData();
}
function closeModal(){document.getElementById('modalOv').classList.remove('on');}
function pickStatus(s){_curStatus=s;hlStatus(s);}
function hlStatus(s){
  document.querySelectorAll('#fStatusBtns .st-btn').forEach(b=>{
    b.className='st-btn'+(b.dataset.s===s?' on-'+b.dataset.s:'');
  });
}
document.getElementById('modalOv').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadData();
ensureOrder();
render();
</script>
</body>
