name: "네이버 조합키워드 수집 (④단계)"

# ③단계 조합 후보(data/combo_candidates.csv)의 '조합키워드'를 네이버로 조회.
# 카테고리/CEP 수집(naver-collect.yml)과 분리된 별도 배치 — 섞지 않음.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "상위 N개만 조회 (0 = 전체 2,148개)"
        required: false
        default: "600"

permissions:
  contents: write

jobs:
  collect-combo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Collect Naver volumes for combo keywords
        env:
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET: ${{ secrets.NAVER_AD_SECRET }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="--limit ${{ github.event.inputs.limit }}"
          fi
          python naver_keyword_data.py --source combo $ARGS

      - name: Rebuild combo CSV (merge Naver)
        run: python build_combos.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/naver_combo_metrics.csv data/combo_candidates.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "네이버 조합키워드 수집 (④단계) $(date +%Y-%m-%d)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
